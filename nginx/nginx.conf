
server {
    listen 80;
    server_name aiapi.clarityenglish.com; # <-- REPLACE with your actual domain name!

    # 1. Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 8000 ssl http2;
    server_name aiapi.clarityenglish.com; # <-- REPLACE with your actual domain name!

    # 2. Point Nginx to the files mapped from the ./certs directory
    # Note: These paths are *inside* the Docker container (where we mapped ./certs)
    ssl_certificate /etc/nginx/certs/*.clarityenglish.com.crt; # Adjust filename as needed
    ssl_certificate_key /etc/nginx/certs/*.clarityenglish.com.key; # Adjust filename as needed

    # 3. Proxy to the API service
    location / {
        proxy_pass http://api:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
